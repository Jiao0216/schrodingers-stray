# Local dev with H2 (no MySQL). For persistent MySQL + stored photos, run WITHOUT this profile, e.g.:
#   export MYSQL_HOST=127.0.0.1 MYSQL_PASSWORD=... OPENAI_API_KEY=...
#   mvn spring-boot:run
# Port defaults to 8090 via CAT_RESCUE_HTTP_PORT (see HttpPortConfiguration).

spring:
  datasource:
    url: jdbc:h2:mem:catrescue;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    # Overrides base application.yml MySQL dialect when using H2.
    database-platform: org.hibernate.dialect.H2Dialect
