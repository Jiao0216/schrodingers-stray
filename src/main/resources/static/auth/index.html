<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="catguardian-api-base" content="">
  <link rel="icon" href="data:,">
  <title>Community Login / Register</title>
  <style>
    :root {
      --bg:#1a1711;
      --panel:#2b2417;
      --panel-2:#342c1d;
      --text:#f6ead3;
      --muted:#c6b48f;
      --border:#5e4d30;
      --primary:#cc8f3f;
      --primary-hover:#df9f4e;
      --danger:#ff8080;
      --ok:#95e39a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
      background:radial-gradient(1200px 700px at 80% -5%,#5e4523 0%,transparent 60%),linear-gradient(180deg,#1a1711,#14110d);
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text)
    }
    .card{
      width:min(480px,100%);background:linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 20px 44px rgba(0,0,0,.38)
    }
    h1{margin:0 0 8px;font-size:1.35rem}
    .sub{margin:0 0 16px;color:var(--muted);font-size:13px}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
    input{
      width:100%;padding:10px 12px;border:1px solid #6b5938;background:#241f15;color:var(--text);
      border-radius:10px;margin-bottom:12px;font-size:14px
    }
    .btn{
      width:100%;border:0;background:var(--primary);color:#1f1405;border-radius:10px;padding:11px 14px;
      font-size:14px;font-weight:700;cursor:pointer
    }
    .btn:hover{background:var(--primary-hover)}
    .btn.secondary{background:#4b3f2a;color:var(--text)}
    .btn.secondary:hover{background:#5a4a30}
    .row{display:flex;gap:8px}
    .row>*{flex:1}
    .switch{margin-top:10px;color:var(--muted);font-size:13px;text-align:center}
    .switch button{border:0;background:none;color:#ffd196;cursor:pointer;font-size:13px;font-weight:600}
    .status{min-height:1.2em;margin-top:12px;font-size:13px}
    .status.err{color:var(--danger)}
    .status.ok{color:var(--ok)}
    .hidden{display:none !important}
    .link-btn{padding:0;border:0;background:none;color:#ffd196;cursor:pointer;font-size:12px;text-decoration:underline}
  </style>
</head>
<body>
  <div class="card">
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px;">
      <button type="button" id="langEnBtn" class="btn secondary" style="width:auto;padding:6px 10px;font-size:12px;">English</button>
      <button type="button" id="langZhBtn" class="btn secondary" style="width:auto;padding:6px 10px;font-size:12px;">Chinese</button>
    </div>
    <h1 id="title">登录社区</h1>
    <p id="sub" class="sub">先登录，没账号可快速注册。</p>

    <form id="loginForm">
      <label for="loginEmail">邮箱</label>
      <input id="loginEmail" type="email" autocomplete="email">
      <label for="loginPassword">密码</label>
      <input id="loginPassword" type="password" autocomplete="current-password">
      <label style="display:flex;align-items:center;gap:8px;margin:2px 0 8px;color:var(--text);font-weight:500;">
        <input id="rememberMe" type="checkbox" style="width:auto;margin:0;">
        记住我（30天）
      </label>
      <button type="button" id="forgotPwdBtn" class="link-btn" style="margin-bottom:10px;">忘记密码？发送重置链接</button>
      <button type="submit" class="btn">登录并进入志愿者中心</button>
    </form>

    <form id="registerForm" class="hidden">
      <label for="regEmail">邮箱</label>
      <input id="regEmail" type="email" autocomplete="email">
      <label for="regName">昵称</label>
      <input id="regName" type="text" maxlength="100" autocomplete="nickname">
      <div id="regNameHint" class="sub" style="margin:-8px 0 8px;"></div>
      <label for="regPassword">密码（至少 8 位）</label>
      <input id="regPassword" type="password" minlength="8" autocomplete="new-password">
      <label for="regCode">邮箱验证码（5分钟有效）</label>
      <div class="row">
        <input id="regCode" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code" style="margin-bottom:0;">
        <button type="button" id="sendCodeBtn" class="btn secondary" style="flex:0 0 150px;">发送验证码</button>
      </div>
      <p id="regCodeHint" class="sub" style="margin:8px 0 10px;"></p>
      <button type="submit" class="btn">注册并进入志愿者中心</button>
    </form>

    <p class="switch">
      <span id="switchText">还没有账号？</span>
      <button type="button" id="switchBtn">去注册</button>
    </p>
    <div id="status" class="status"></div>
  </div>

  <script>
    const LANG_KEY = "cat_rescue_ui_lang";
    const VOLUNTEER_KEY = "catguardian_volunteer_user_id";
    const VOLUNTEER_ID_KEY = "volunteer_id";
    const AUTH_KEY = "catguardian_auth_session";
    const TOKEN_KEY = "token";
    let isLogin = true;
    let nicknameTimer = null;
    let nicknameTaken = false;
    let lang = (localStorage.getItem(LANG_KEY) || "en") === "zh" ? "zh" : "en";

    const I18N = {
      zh: {
        pageTitle: "加入社区 · 登录 / 注册",
        langEn: "英文",
        langZh: "中文",
        titleLogin: "登录社区",
        titleRegister: "注册社区账号",
        subLogin: "先登录，没账号可快速注册。",
        subRegister: "注册成功将自动登录并进入志愿者中心。",
        labelEmail: "邮箱",
        labelPassword: "密码",
        labelRemember: "记住我（30天）",
        btnForgot: "忘记密码？发送重置链接",
        btnLogin: "登录并进入志愿者中心",
        labelNickname: "昵称",
        labelRegPassword: "密码（至少 8 位）",
        labelCode: "邮箱验证码（5分钟有效）",
        btnSendCode: "发送验证码",
        btnRegister: "注册并进入志愿者中心",
        switchNoAccount: "还没有账号？",
        switchHasAccount: "已有账号？",
        switchToRegister: "去注册",
        switchToLogin: "返回登录",
        statusNeedRegEmail: "请先输入注册邮箱。",
        statusCodeSendFail: "验证码发送失败：",
        statusRetry: "请稍后重试",
        statusCodeSentHint: "验证码已发送至邮箱，请在5分钟内填写。",
        statusCodeSentOk: "验证码发送成功。",
        statusCodeSendErr: "验证码发送失败，请稍后重试。",
        statusNeedLoginEmail: "请先输入登录邮箱。",
        statusResetFail: "发送重置链接失败：",
        statusResetOk: "如该邮箱已注册，重置链接已发送。",
        statusResetErr: "发送重置链接失败，请稍后重试。",
        statusNeedLoginCreds: "请输入邮箱和密码。",
        statusLoginFail: "登录失败，请检查邮箱和密码。",
        statusLoginOk: "登录成功，正在进入志愿者中心…",
        statusNetworkErr: "网络异常，请稍后重试。",
        statusNeedRegisterFields: "请完整填写注册信息。",
        statusPasswordTooShort: "密码至少 8 位。",
        statusNeedCode: "请先输入邮箱验证码。",
        statusNicknameTaken: "昵称已被占用，请更换。",
        statusEmailTaken: "该邮箱已注册，请直接登录。",
        statusCodeInvalid: "验证码错误或已过期，请重新发送。",
        statusRegisterFail: "注册失败：",
        statusRegisterOk: "注册成功，正在进入志愿者中心…",
        nicknameTaken: "该昵称已被占用，请更换。",
        nicknameAvailable: "该昵称可用。"
      },
      en: {
        pageTitle: "Community Login / Register",
        langEn: "English",
        langZh: "Chinese",
        titleLogin: "Community Login",
        titleRegister: "Create Community Account",
        subLogin: "Sign in first. New users can register in seconds.",
        subRegister: "Registration signs you in and enters Volunteer Hub.",
        labelEmail: "Email",
        labelPassword: "Password",
        labelRemember: "Remember me (30 days)",
        btnForgot: "Forgot password? Send reset link",
        btnLogin: "Sign in to Volunteer Hub",
        labelNickname: "Nickname",
        labelRegPassword: "Password (minimum 8 chars)",
        labelCode: "Email verification code (5 minutes)",
        btnSendCode: "Send code",
        btnRegister: "Register and enter Volunteer Hub",
        switchNoAccount: "No account yet?",
        switchHasAccount: "Already have an account?",
        switchToRegister: "Register",
        switchToLogin: "Back to login",
        statusNeedRegEmail: "Please enter your registration email first.",
        statusCodeSendFail: "Failed to send code: ",
        statusRetry: "please try again later",
        statusCodeSentHint: "Code sent to email. Please enter it within 5 minutes.",
        statusCodeSentOk: "Verification code sent.",
        statusCodeSendErr: "Failed to send code. Please try again later.",
        statusNeedLoginEmail: "Please enter your login email first.",
        statusResetFail: "Failed to send reset link: ",
        statusResetOk: "If the email exists, a reset link has been sent.",
        statusResetErr: "Failed to send reset link. Please try again later.",
        statusNeedLoginCreds: "Please enter email and password.",
        statusLoginFail: "Login failed. Please check email and password.",
        statusLoginOk: "Login successful. Redirecting to Volunteer Hub…",
        statusNetworkErr: "Network error. Please try again later.",
        statusNeedRegisterFields: "Please complete all required registration fields.",
        statusPasswordTooShort: "Password must be at least 8 characters.",
        statusNeedCode: "Please enter the verification code first.",
        statusNicknameTaken: "Nickname is already taken. Please choose another.",
        statusEmailTaken: "This email is already registered. Please sign in.",
        statusCodeInvalid: "Verification code invalid or expired. Please resend.",
        statusRegisterFail: "Registration failed: ",
        statusRegisterOk: "Registration successful. Redirecting to Volunteer Hub…",
        nicknameTaken: "This nickname is already taken.",
        nicknameAvailable: "This nickname is available."
      }
    };

    function t(key) {
      const table = I18N[lang] || I18N.en;
      return table[key] || I18N.en[key] || key;
    }

    function getApiBase() {
      const q = new URLSearchParams(window.location.search || "").get("api");
      if (q && q.trim()) return q.trim().replace(/\/+$/, "");
      const m = document.querySelector('meta[name="catguardian-api-base"]');
      const c = m ? (m.getAttribute("content") || "").trim() : "";
      return c ? c.replace(/\/+$/, "") : "";
    }
    function tunnelBypassHeaders() {
      const host = window.location.hostname || "";
      if (!host) return {};
      if (
        host.includes("ngrok-free") ||
        host.endsWith(".ngrok.io") ||
        host.endsWith(".ngrok.app") ||
        host.includes("ngrok") ||
        host.endsWith("trycloudflare.com")
      ) {
        return { "ngrok-skip-browser-warning": "true" };
      }
      return {};
    }
    function mergeFetchHeaders(h) {
      return Object.assign({}, tunnelBypassHeaders(), h || {});
    }
    function apiUrl(path) {
      const rel = path.startsWith("/") ? path : "/" + path;
      const base = getApiBase();
      return !base ? new URL(rel, window.location.origin).href : new URL(rel, base.endsWith("/") ? base : base + "/").href;
    }
    function setStatus(msg, type) {
      const s = document.getElementById("status");
      s.textContent = msg || "";
      s.className = "status" + (type ? " " + type : "");
    }
    async function extractErrorDetail(resp) {
      try {
        const txt = await resp.text();
        if (!txt) return "HTTP " + resp.status;
        try {
          const j = JSON.parse(txt);
          return String(j.detail || j.message || j.error || j.title || ("HTTP " + resp.status));
        } catch (_e) {
          return txt.slice(0, 180);
        }
      } catch (_e) {
        return "HTTP " + resp.status;
      }
    }
    function setMode(loginMode) {
      isLogin = loginMode;
      document.getElementById("loginForm").classList.toggle("hidden", !loginMode);
      document.getElementById("registerForm").classList.toggle("hidden", loginMode);
      document.getElementById("title").textContent = loginMode ? t("titleLogin") : t("titleRegister");
      document.getElementById("sub").textContent = loginMode ? t("subLogin") : t("subRegister");
      document.getElementById("switchText").textContent = loginMode ? t("switchNoAccount") : t("switchHasAccount");
      document.getElementById("switchBtn").textContent = loginMode ? t("switchToRegister") : t("switchToLogin");
      setStatus("");
    }
    function applyI18n() {
      document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
      document.title = t("pageTitle");
      document.getElementById("langEnBtn").textContent = t("langEn");
      document.getElementById("langZhBtn").textContent = t("langZh");
      document.getElementById("langEnBtn").style.opacity = lang === "en" ? "1" : "0.7";
      document.getElementById("langZhBtn").style.opacity = lang === "zh" ? "1" : "0.7";
      document.querySelector("label[for='loginEmail']").textContent = t("labelEmail");
      document.querySelector("label[for='loginPassword']").textContent = t("labelPassword");
      document.querySelector("label[for='regEmail']").textContent = t("labelEmail");
      document.querySelector("label[for='regName']").textContent = t("labelNickname");
      document.querySelector("label[for='regPassword']").textContent = t("labelRegPassword");
      document.querySelector("label[for='regCode']").textContent = t("labelCode");
      document.getElementById("sendCodeBtn").textContent = t("btnSendCode");
      document.getElementById("forgotPwdBtn").textContent = t("btnForgot");
      document.querySelector("#loginForm .btn[type='submit']").textContent = t("btnLogin");
      document.querySelector("#registerForm .btn[type='submit']").textContent = t("btnRegister");
      const rememberLine = document.querySelector("label[style*='align-items:center']");
      if (rememberLine && rememberLine.lastChild) {
        rememberLine.lastChild.textContent = " " + t("labelRemember");
      }
      setMode(isLogin);
    }
    function buildAuthSession(user, rememberMe) {
      const now = Date.now();
      const ttlMs = rememberMe ? (30 * 24 * 60 * 60 * 1000) : (24 * 60 * 60 * 1000);
      return {
        token: "cg_" + String(user.id) + "_" + now,
        rememberMe: !!rememberMe,
        expiresAt: now + ttlMs,
        user: { id: user.id, email: user.email || "", displayName: user.displayName || "" }
      };
    }
    function persistSession(user, rememberMe) {
      const session = buildAuthSession(user, rememberMe);
      try {
        localStorage.setItem(VOLUNTEER_KEY, String(user.id));
        localStorage.setItem(VOLUNTEER_ID_KEY, String(user.id));
        localStorage.setItem(TOKEN_KEY, session.token);
        localStorage.setItem(AUTH_KEY, JSON.stringify(session));
      } catch (_e) {}
      try {
        sessionStorage.setItem(AUTH_KEY, JSON.stringify(session));
      } catch (_e) {}
    }
    function readJsonSafe(storage, key) {
      try {
        const raw = storage.getItem(key);
        return raw ? JSON.parse(raw) : null;
      } catch (_e) { return null; }
    }
    function readAuthSession() {
      const local = readJsonSafe(localStorage, AUTH_KEY);
      const sess = readJsonSafe(sessionStorage, AUTH_KEY);
      const picked = local || sess;
      if (!picked || !picked.token || !picked.user || !picked.user.id) return null;
      if (Number(picked.expiresAt || 0) <= Date.now()) return null;
      return picked;
    }
    function hasLoggedInState() {
      const s = readAuthSession();
      if (s && s.user && s.user.id != null) return true;
      try {
        const token = (localStorage.getItem(TOKEN_KEY) || "").trim();
        const vid = (localStorage.getItem(VOLUNTEER_ID_KEY) || localStorage.getItem(VOLUNTEER_KEY) || "").trim();
        return !!token && /^[1-9]\d*$/.test(vid);
      } catch (_e) { return false; }
    }
    function hydrateRememberMe() {
      const session = readAuthSession();
      const cb = document.getElementById("rememberMe");
      if (cb) cb.checked = !!(session && session.rememberMe);
    }
    function goVolunteer() { window.location.href = "/volunteer"; }

    async function checkNicknameRealtime() {
      const name = (document.getElementById("regName").value || "").trim();
      const hint = document.getElementById("regNameHint");
      nicknameTaken = false;
      if (!name) { if (hint) hint.textContent = ""; return; }
      try {
        const u = new URL(apiUrl("/api/v1/auth/nickname-exists"));
        u.searchParams.set("displayName", name);
        const r = await fetch(u.toString(), {
          method: "POST",
          credentials: "omit",
          mode: "cors",
          headers: mergeFetchHeaders({ Accept: "application/json" })
        });
        const j = await r.json();
        nicknameTaken = !!(j && j.exists);
        if (hint) {
          hint.style.color = nicknameTaken ? "var(--danger)" : "var(--ok)";
          hint.textContent = nicknameTaken ? t("nicknameTaken") : t("nicknameAvailable");
        }
      } catch (_e) {
        if (hint) { hint.style.color = "var(--muted)"; hint.textContent = ""; }
      }
    }

    document.getElementById("switchBtn").addEventListener("click", () => setMode(!isLogin));
    document.getElementById("regName").addEventListener("input", () => {
      if (nicknameTimer) clearTimeout(nicknameTimer);
      nicknameTimer = setTimeout(checkNicknameRealtime, 260);
    });
    document.getElementById("sendCodeBtn").addEventListener("click", async () => {
      const email = (document.getElementById("regEmail").value || "").trim();
      if (!email) return setStatus(t("statusNeedRegEmail"), "err");
      try {
        let ok = false;
        let lastErr = "";
        const paths = ["/api/v1/auth/send-code", "/api/v1/auth/send-email-code"];
        for (const p of paths) {
          const u = new URL(apiUrl(p));
          u.searchParams.set("email", email);
          const r = await fetch(u.toString(), { method: "POST", credentials: "omit", mode: "cors", headers: mergeFetchHeaders({ Accept: "application/json" }) });
          if (r.ok) {
            ok = true;
            break;
          }
          lastErr = await extractErrorDetail(r);
        }
        if (!ok) return setStatus(t("statusCodeSendFail") + (lastErr || t("statusRetry")), "err");
        const hint = document.getElementById("regCodeHint");
        if (hint) hint.textContent = t("statusCodeSentHint");
        setStatus(t("statusCodeSentOk"), "ok");
      } catch (_e) {
        setStatus(t("statusCodeSendErr"), "err");
      }
    });

    document.getElementById("forgotPwdBtn").addEventListener("click", async () => {
      const email = (document.getElementById("loginEmail").value || "").trim();
      if (!email) return setStatus(t("statusNeedLoginEmail"), "err");
      try {
        let ok = false;
        let lastErr = "";
        const paths = ["/api/v1/auth/forgot-password", "/api/v1/auth/send-reset-link"];
        for (const p of paths) {
          const r = await fetch(apiUrl(p), {
            method: "POST",
            headers: mergeFetchHeaders({ "Content-Type": "application/json", Accept: "application/json" }),
            body: JSON.stringify({ email }),
            credentials: "omit",
            mode: "cors"
          });
          if (r.ok) {
            ok = true;
            break;
          }
          lastErr = await extractErrorDetail(r);
        }
        if (!ok) return setStatus(t("statusResetFail") + (lastErr || t("statusRetry")), "err");
        setStatus(t("statusResetOk"), "ok");
      } catch (_e) {
        setStatus(t("statusResetErr"), "err");
      }
    });

    document.getElementById("loginForm").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const email = (document.getElementById("loginEmail").value || "").trim();
      const password = document.getElementById("loginPassword").value || "";
      if (!email || !password) return setStatus(t("statusNeedLoginCreds"), "err");
      try {
        const r = await fetch(apiUrl("/api/v1/auth/login"), {
          method: "POST",
          headers: mergeFetchHeaders({ "Content-Type": "application/json", Accept: "application/json" }),
          body: JSON.stringify({ email, password }),
          credentials: "omit",
          mode: "cors"
        });
        const txt = await r.text();
        if (!r.ok) return setStatus(t("statusLoginFail"), "err");
        persistSession(JSON.parse(txt), !!document.getElementById("rememberMe").checked);
        setStatus(t("statusLoginOk"), "ok");
        setTimeout(goVolunteer, 250);
      } catch (_e) {
        setStatus(t("statusNetworkErr"), "err");
      }
    });

    document.getElementById("registerForm").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const email = (document.getElementById("regEmail").value || "").trim();
      const displayName = (document.getElementById("regName").value || "").trim();
      const verificationCode = (document.getElementById("regCode").value || "").trim();
      const password = document.getElementById("regPassword").value || "";
      if (!email || !displayName || !password) return setStatus(t("statusNeedRegisterFields"), "err");
      if (password.length < 8) return setStatus(t("statusPasswordTooShort"), "err");
      if (!verificationCode) return setStatus(t("statusNeedCode"), "err");
      if (nicknameTaken) return setStatus(t("statusNicknameTaken"), "err");
      try {
        const r = await fetch(apiUrl("/api/v1/auth/register"), {
          method: "POST",
          headers: mergeFetchHeaders({ "Content-Type": "application/json", Accept: "application/json" }),
          body: JSON.stringify({ email, displayName, password, verificationCode }),
          credentials: "omit",
          mode: "cors"
        });
        const txt = await r.text();
        if (!r.ok) {
          let detail = "";
          try {
            const j = txt ? JSON.parse(txt) : null;
            detail = j && (j.detail || j.message || j.error || j.title) ? String(j.detail || j.message || j.error || j.title) : "";
          } catch (_e) { detail = (txt || "").slice(0, 120); }
          const low = detail.toLowerCase();
          if (r.status === 409 && low.includes("email")) {
            setStatus(t("statusEmailTaken"), "err");
            document.getElementById("loginEmail").value = email;
            setMode(true);
            return;
          }
          if (r.status === 409 && low.includes("displayname")) return setStatus(t("statusNicknameTaken"), "err");
          if (r.status === 400 && low.includes("verification")) return setStatus(t("statusCodeInvalid"), "err");
          return setStatus(t("statusRegisterFail") + (detail || ("HTTP " + r.status)), "err");
        }
        const user = JSON.parse(txt);
        persistSession(user, true);
        setStatus(t("statusRegisterOk"), "ok");
        setTimeout(goVolunteer, 250);
      } catch (_e) {
        setStatus(t("statusNetworkErr"), "err");
      }
    });

    document.getElementById("langEnBtn").addEventListener("click", () => {
      lang = "en";
      localStorage.setItem(LANG_KEY, "en");
      applyI18n();
    });
    document.getElementById("langZhBtn").addEventListener("click", () => {
      lang = "zh";
      localStorage.setItem(LANG_KEY, "zh");
      applyI18n();
    });

    const mode = (new URLSearchParams(window.location.search || "").get("mode") || "").trim();
    setMode(mode === "register" ? false : true);
    hydrateRememberMe();
    applyI18n();
  </script>
</body>
</html>
